name: gamedib
description: An endless runner platformer game built with Flutter and Flame.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.18.0
  flame_audio: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/400 Sounds Pack/Retro/
    - assets/sounds/400 Sounds Pack/Weapons/
    - assets/sounds/400 Sounds Pack/Musical Effects/
    - assets/sounds/400 Sounds Pack/UI/
